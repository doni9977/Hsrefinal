name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/capstone-app:latest
            ${{ secrets.DOCKER_USERNAME }}/capstone-app:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted  # ЗАПУСКАЕТСЯ НА МАКЕ ДОННИ
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/

      - name: Deploy dynamic image tag to Cluster
        run: |
          kubectl set image deployment/capstone-app capstone-app=${{ secrets.DOCKER_USERNAME }}/capstone-app:${{ needs.build-and-push.outputs.image_tag }}
          kubectl rollout status deployment/capstone-app