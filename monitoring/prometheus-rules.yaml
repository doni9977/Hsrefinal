apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: sre-capstone
  labels:
    release: prometheus
spec:
  groups:
  - name: capstone-service-alerts
    rules:
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="sre-capstone", container!=""}[5m])) by (pod) > 0.8
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High CPU utilization detected"
        description: "Pod {{ $labels.pod }} CPU usage is above 80% for more than 2 minutes."
        
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="sre-capstone"}[5m]) * 60 > 2
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod is crash-looping"
        description: "Pod {{ $labels.pod }} is restarting frequently (more than 2 times per minute)."